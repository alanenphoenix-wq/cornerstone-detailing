<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cornerstone Detailing | Sacramento CA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }

    /* VIDEO BG */
    .bg-video {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: rgba(0,0,0,0.55);
    }

    /* MAIN LAYOUT */
    .page {
      position: relative; z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 0 0;
    }

    /* LOGO */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .logo-box {
      width: 64px; height: 64px;
      border: 2px solid #C9A84C;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 22px; color: #C9A84C;
      letter-spacing: -1px;
    }
    .logo-name {
      font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: rgba(255,255,255,0.8);
    }

    /* PROGRESS BAR */
    .progress-bar {
      width: 90%; height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 16px;
    }
    .progress-fill {
      height: 100%;
      background: #C9A84C;
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    /* CAROUSEL */
    .carousel {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      width: 100%; position: relative;
      padding: 0 20px;
    }
    .carousel-inner {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; text-align: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .carousel-inner.hidden {
      opacity: 0; transform: scale(0.95);
    }
    .service-icon {
      font-size: 100px;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.6));
    }
    .service-name {
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 700;
      color: #C9A84C;
      line-height: 1.2;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }
    .service-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      max-width: 280px;
      line-height: 1.5;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }

    /* ARROWS */
    .arrow {
      position: absolute; top: 50%;
      transform: translateY(-50%);
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff;
      cursor: pointer;
      backdrop-filter: blur(4px);
      user-select: none;
      transition: background 0.2s;
    }
    .arrow:hover { background: rgba(255,255,255,0.25); }
    .arrow.left { left: 12px; }
    .arrow.right { right: 12px; }

    /* DOTS */
    .dots {
      display: flex; gap: 8px; justify-content: center;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer; transition: background 0.3s, transform 0.3s;
    }
    .dot.active { background: #C9A84C; transform: scale(1.5); }

    /* BOTTOM ACTIONS */
    .bottom {
      width: 100%;
      background: #fff;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
    }
    .action-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid #eee;
      text-decoration: none;
      color: #111;
      transition: background 0.15s;
    }
    .action-btn:last-child { border-bottom: none; }
    .action-btn:hover { background: #f5f5f5; }
    .action-left {
      display: flex; align-items: center; gap: 14px;
    }
    .action-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .action-icon.call { background: #000; }
    .action-icon.sms { background: #1A3EBF; }
    .action-label { font-size: 11px; color: #999; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .action-value { font-size: 15px; font-weight: 700; color: #111; }
    .action-arrow { font-size: 18px; color: #999; }

    /* LANG */
    .lang-toggle {
      position: fixed; top: 20px; right: 16px; z-index: 10;
      display: flex; gap: 3px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; padding: 3px;
      backdrop-filter: blur(8px);
    }
    .lang-btn {
      padding: 4px 10px; border-radius: 4px;
      font-size: 11px; font-weight: 700;
      cursor: pointer; border: none;
      background: transparent; color: #aaa;
    }
    .lang-btn.active { background: #C9A84C; color: #000; }

    .en, .es { display: none; }
  </style>
</head>
<body>

<!-- VIDEO BG -->
<video class="bg-video" autoplay muted loop playsinline
  poster="https://images.unsplash.com/photo-1607860108855-64acf2078ed9?w=800">
  <source src="" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<!-- LANG -->
<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('es')">ES</button>
</div>

<!-- PAGE -->
<div class="page">

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-box">CD</div>
    <div class="logo-name">Cornerstone Detailing</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <!-- CAROUSEL -->
  <div class="carousel">
    <div class="arrow left" onclick="prevSlide()">‹</div>
    <div class="carousel-inner" id="carouselInner">
      <div class="service-icon" id="svcIcon"></div>
      <div class="service-name" id="svcName"></div>
      <div class="service-desc" id="svcDesc"></div>
    </div>
    <div class="arrow right" onclick="nextSlide()">›</div>
  </div>

  <!-- DOTS -->
  <div class="dots" id="dots"></div>

  <!-- BOTTOM -->
  <div class="bottom">
    <a href="tel:9166554414" class="action-btn">
      <div class="action-left">
        <div class="action-icon call">📞</div>
        <div>
          <div class="action-label"><span class="en">Call for a Quote</span><span class="es">Llama para un Precio</span></div>
          <div class="action-value">(916) 655-4414</div>
        </div>
      </div>
      <div class="action-arrow">›</div>
    </a>
    <a href="sms:9166554414" class="action-btn">
      <div class="action-left">
        <div class="action-icon sms">💬</div>
        <div>
          <div class="action-label"><span class="en">Text Us</span><span class="es">Escríbenos</span></div>
          <div class="action-value"><span class="en">Send a Message</span><span class="es">Manda un Mensaje</span></div>
        </div>
      </div>
      <div class="action-arrow">›</div>
    </a>
  </div>

</div>

<script>
  const servicios = {
    en: [
      { icon: '🛡️', name: 'Ceramic Coating', desc: 'Long-lasting protection that repels water, dirt & UV damage. Your paint stays pristine for years.' },
      { icon: '🪑', name: 'Interior Detailing', desc: 'Deep cleaning of every surface — seats, carpets, dashboard. Odor elimination included.' },
      { icon: '✨', name: 'Paint Polishing', desc: 'Remove swirl marks, scratches & oxidation. Restore the factory shine your car deserves.' },
    ],
    es: [
      { icon: '🛡️', name: 'Ceramic Coating', desc: 'Protección duradera que repele agua, suciedad y rayos UV. Tu pintura impecable por años.' },
      { icon: '🪑', name: 'Detallado Interior', desc: 'Limpieza profunda de cada superficie — asientos, tapetes, tablero. Eliminación de olores incluida.' },
      { icon: '✨', name: 'Pulido de Pintura', desc: 'Elimina rayones y oxidación. Devuelve el brillo de fábrica que tu auto merece.' },
    ]
  };

  let lang = 'en';
  let current = 0;
  let timer;
  let progress = 0;
  const INTERVAL = 4000;

  function setLang(l) {
    lang = l;
    document.querySelectorAll('.en').forEach(el => el.style.display = l === 'en' ? 'inline' : 'none');
    document.querySelectorAll('.es').forEach(el => el.style.display = l === 'es' ? 'inline' : 'none');
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent === l.toUpperCase());
    });
    renderSlide(current, false);
  }

  function buildDots() {
    const container = document.getElementById('dots');
    container.innerHTML = '';
    servicios.en.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.onclick = () => goSlide(i);
      container.appendChild(d);
    });
  }

  function updateDots() {
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  function renderSlide(index, animate = true) {
    const inner = document.getElementById('carouselInner');
    const data = servicios[lang][index];

    if (animate) {
      inner.classList.add('hidden');
      setTimeout(() => {
        document.getElementById('svcIcon').textContent = data.icon;
        document.getElementById('svcName').textContent = data.name;
        document.getElementById('svcDesc').textContent = data.desc;
        inner.classList.remove('hidden');
      }, 400);
    } else {
      document.getElementById('svcIcon').textContent = data.icon;
      document.getElementById('svcName').textContent = data.name;
      document.getElementById('svcDesc').textContent = data.desc;
    }
    updateDots();
  }

  function goSlide(index) {
    current = index;
    resetTimer();
    renderSlide(current);
  }

  function nextSlide() {
    current = (current + 1) % servicios.en.length;
    resetTimer();
    renderSlide(current);
  }

  function prevSlide() {
    current = (current - 1 + servicios.en.length) % servicios.en.length;
    resetTimer();
    renderSlide(current);
  }

  function resetTimer() {
    clearInterval(timer);
    progress = 0;
    document.getElementById('progressFill').style.width = '0%';
    startTimer();
  }

  function startTimer() {
    const step = 100 / (INTERVAL / 50);
    timer = setInterval(() => {
      progress += step;
      document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
      if (progress >= 100) {
        progress = 0;
        current = (current + 1) % servicios.en.length;
        renderSlide(current);
      }
    }, 50);
  }

  // INIT
  buildDots();
  renderSlide(0, false);
  setLang('en');
  startTimer();
</script>
</body>
</html>
